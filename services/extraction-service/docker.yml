# docker-compose.yml - SIMPLIFIED COMPLETE VERSION
services:
  # Infrastructure Services
  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"

  kafka:
    image: wurstmeister/kafka:latest
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_ADVERTISED_HOST_NAME: localhost
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "raw-threat-data:1:1,enriched-iocs:1:1,ranked-iocs:1:1"
    ports:
      - "9092:9092"

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: threat_intel
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  # Your Microservices
  extraction-service:
    build: ./services/extraction-service
    container_name: extraction-service
    depends_on:
      - kafka
      - mysql
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/threat_intel
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    ports:
      - "8082:8082"

volumes:
  mysql-data: